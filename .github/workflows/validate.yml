name: Repository Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  syntax-check:
    name: Bash Syntax Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate bash syntax
        run: |
          echo "Validating bash syntax..."
          errors=0

          while IFS= read -r -d '' script; do
            echo "  Checking: $script"
            if ! bash -n "$script"; then
              echo "  Syntax error in: $script"
              errors=$((errors + 1))
            fi
          done < <(find . -name "*.sh" -type f -print0)
          
          if [ $errors -gt 0 ]; then
            echo "Found $errors script(s) with syntax errors"
            exit 1
          else
            echo "All scripts passed syntax validation"
          fi

  shellcheck:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: find . -name '*.sh' -type f -print0 | xargs -0 shellcheck

  device-profile-regressions:
    name: Device Profile Regression Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run device detection regression script
        run: bash tests/device-manager-detection.sh

  python-sanity:
    name: Command Center Python Sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile command-center sources
        run: |
          find command-center/src -name '*.py' -type f -print0 | xargs -0 python3 -m py_compile

  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version consistency
        run: bash tests/validate-version-sync.sh

  generated-content-check:
    name: Generated Content Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify generated device matrix blocks are up to date
        run: |
          bash scripts/sync-device-matrix.sh
          git diff --exit-code
